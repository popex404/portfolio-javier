<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    var l = window.location;
    var base = l.pathname.split('/').slice(0, 2).join('/');
    var rest = l.pathname.slice(1).split('/').slice(1).join('/');
    l.replace(l.protocol + '//' + l.host + base + '/?/' + rest + l.search + l.hash);
  </script>
</head>
</html>
