<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09121f"/>
      <stop offset="100%" style="stop-color:#0d1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0f4f8"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e2d45" stroke-width="1" opacity="0.6">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Decorative bar chart (right side) -->
  <g opacity="0.15">
    <rect x="820" y="240" width="28" height="180" rx="4" fill="#34d399"/>
    <rect x="864" y="190" width="28" height="230" rx="4" fill="#34d399"/>
    <rect x="908" y="280" width="28" height="140" rx="4" fill="#34d399"/>
    <rect x="952" y="150" width="28" height="270" rx="4" fill="#34d399"/>
    <rect x="996" y="210" width="28" height="210" rx="4" fill="#34d399"/>
    <rect x="1040" y="170" width="28" height="250" rx="4" fill="#34d399"/>
    <rect x="1084" y="260" width="28" height="160" rx="4" fill="#34d399"/>
    <rect x="1128" y="130" width="28" height="290" rx="4" fill="#34d399"/>
  </g>

  <!-- Top accent bar -->
  <rect x="80" y="72" width="160" height="3" rx="2" fill="url(#accent)"/>

  <!-- Name -->
  <text x="80" y="180" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="url(#nameGrad)">Javier García</text>

  <!-- Title line 1 -->
  <text x="80" y="240" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="600" fill="#f0f4f8" opacity="0.95">Analista de Datos</text>

  <!-- Title line 2 -->
  <text x="80" y="282" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="400" fill="#8fa3b8">Blockchain &amp; SQL · Automatización &amp; ETL</text>

  <!-- Divider -->
  <rect x="80" y="316" width="680" height="1" fill="#1e2d45"/>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <text x="80" y="364" font-family="ui-sans-serif, system-ui, sans-serif" font-size="38" font-weight="700" fill="#34d399">40+</text>
  <text x="80" y="392" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#8fa3b8">análisis publicados</text>

  <!-- Stat 2 -->
  <text x="240" y="364" font-family="ui-sans-serif, system-ui, sans-serif" font-size="38" font-weight="700" fill="#34d399">13</text>
  <text x="240" y="392" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#8fa3b8">redes blockchain</text>

  <!-- Stat 3 -->
  <text x="390" y="364" font-family="ui-sans-serif, system-ui, sans-serif" font-size="38" font-weight="700" fill="#34d399">C1</text>
  <text x="390" y="392" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#8fa3b8">inglés · remoto</text>

  <!-- Badges row -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600">
    <!-- SQL -->
    <rect x="80" y="422" width="56" height="30" rx="15" fill="#1e2d45" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
    <text x="108" y="442" text-anchor="middle" fill="#f0f4f8">SQL</text>
    <!-- Python -->
    <rect x="148" y="422" width="74" height="30" rx="15" fill="#1e2d45" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
    <text x="185" y="442" text-anchor="middle" fill="#f0f4f8">Python</text>
    <!-- Power BI -->
    <rect x="234" y="422" width="84" height="30" rx="15" fill="#1e2d45" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
    <text x="276" y="442" text-anchor="middle" fill="#f0f4f8">Power BI</text>
    <!-- Tableau -->
    <rect x="330" y="422" width="76" height="30" rx="15" fill="#1e2d45" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
    <text x="368" y="442" text-anchor="middle" fill="#f0f4f8">Tableau</text>
    <!-- ML -->
    <rect x="418" y="422" width="130" height="30" rx="15" fill="#1e2d45" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
    <text x="483" y="442" text-anchor="middle" fill="#f0f4f8">Machine Learning</text>
    <!-- Blockchain -->
    <rect x="560" y="422" width="92" height="30" rx="15" fill="#1e2d45" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
    <text x="606" y="442" text-anchor="middle" fill="#f0f4f8">Blockchain</text>
  </g>

  <!-- Proof of Work -->
  <text x="80" y="506" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#34d399" font-weight="600">🏆 Top Analista · Flipside Crypto</text>
  <text x="400" y="506" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#34d399" font-weight="600">🧪 Data Alchemist · CovalentHQ</text>

  <!-- Bottom divider -->
  <rect x="0" y="552" width="1200" height="1" fill="#1e2d45"/>

  <!-- URL -->
  <text x="80" y="592" font-family="ui-monospace, monospace" font-size="18" fill="#8fa3b8">popex404.github.io/portfolio-javier</text>

  <!-- Valparaíso tag -->
  <text x="1120" y="592" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#8fa3b8">Valparaíso, Chile</text>
</svg>
